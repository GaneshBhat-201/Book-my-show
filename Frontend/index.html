<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CineBook</title>
        <link
            rel="icon"
            href="/src/assets/images/logo1.webp"
            type="image/webp"
        />
        <meta
            name="description"
            content="Cinebook is application where user can book tickets of movies, discover showtime, select seats and enjoy seamless ticket booking."
        />
        <meta
            name="keywords"
            content="movie, theater, slot, booking, movie ticket booking, showtime, cinema booking "
        />
        <style>
            #loader {
                width: 48px;
                height: 48px;
                border-radius: 50%;
                display: inline-block;
                border-top: 3px solid #080808;
                border-right: 3px solid transparent;
                box-sizing: border-box;
                animation: rotation 1s linear infinite;
            }

            @keyframes rotation {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }

            #loader-container {
                display: flex;
                width: 100vw;
                height: 100vh;
                justify-content: center;
                align-items: center;
            }
        </style>
    </head>
    <body>
        <div id="root">
            <div id="loader-container">
                <span id="loader"></span>
            </div>
        </div>
        <noscript>Your browser does not support JavaScript!</noscript>
        <script type="module" src="/src/index.tsx"></script>
    </body>
</html>
